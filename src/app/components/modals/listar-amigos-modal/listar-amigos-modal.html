<div
  class="modal-overlay fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50"
  (click)="onOverlayClick($event)"
>
  <div
    class="bg-zinc-900/90 border border-amber-900/50 rounded-md w-full max-w-md mx-4 p-6 shadow-xl"
    (click)="$event.stopPropagation()"
  >
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-2">
        <span class="size-2 rounded-full bg-amber-400 animate-pulse"></span>
        <h2 class="text-amber-300 text-xs font-medium tracking-widest uppercase">Mis amigos</h2>
      </div>
      <button
        (click)="cerrar.emit()"
        class="text-amber-700 hover:text-amber-400 transition-colors text-sm"
      >
        ✕
      </button>
    </div>

    <div class="flex flex-col gap-2">
      @if (amigos().length === 0) {
        <div class="text-amber-800 text-xs uppercase tracking-wider text-center py-6">
          No tienes amigos todavía
        </div>
      }

      @for (amigo of amigos(); track amigo.idAmigo) {
        <div
          class="flex items-center justify-between gap-3 bg-amber-900/30 border border-amber-600/50 rounded-md px-4 py-3"
        >
          <div class="flex items-center gap-3">
            <div
              class="size-8 rounded-full bg-amber-500/20 flex items-center justify-center text-amber-300 text-sm font-semibold shrink-0"
            >
              {{ amigo.nombreAmigo[0].toUpperCase() }}
            </div>
            <p class="text-amber-200 text-sm font-medium">{{ amigo.nombreAmigo }}</p>
          </div>
          <button
            (click)="abrirModal(amigo)"
            class="px-4 py-2 text-xs bg-amber-500/15 hover:bg-amber-500/25 text-amber-400 uppercase tracking-wider font-medium rounded-md transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
          >
            Invitar
          </button>
        </div>
      }
    </div>
  </div>
</div>

@if (InvitacionAColaborarAbierta()) {
  <app-invitacion-acolaborar-modal
    [amigo]="amigoSeleccionado()!"
    (cerrar)="InvitacionAColaborarAbierta.set(false)"
  />
}
