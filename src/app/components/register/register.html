<div class="min-h-screen bg-slate-900 flex items-center justify-center p-4 sm:p-6">
  <div
    class="w-full max-w-sm bg-amber-900/25 border border-amber-800/40 rounded-2xl p-8 sm:p-10 backdrop-blur-sm"
  >
    <div
      class="size-12 bg-amber-800/40 border border-amber-700/40 rounded-xl flex items-center justify-center mx-auto mb-5"
    >
      <svg
        class="size-6 text-amber-400"
        fill="none"
        stroke="currentColor"
        stroke-width="1.8"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"
        />
      </svg>
    </div>

    <h1 class="text-center text-xl font-semibold text-amber-200 mb-1">Crear cuenta</h1>
    <p class="text-center text-sm text-amber-700 mb-8">Empieza a organizar tu trabajo hoy</p>

    <form (ngSubmit)="onSubmit()">
      <div class="flex flex-col gap-1 mb-4">
        <label class="text-xs font-medium text-amber-600 uppercase tracking-wider">Nombre</label>
        <input
          type="text"
          name="nombre"
          [(ngModel)]="dto.nombreUsuario"
          placeholder="Tu nombre"
          class="bg-amber-900/30 border border-amber-800/50 rounded-xl px-4 py-3 text-sm text-amber-200 placeholder:text-amber-800 focus:outline-none focus:border-amber-600/60 transition-colors"
        />
      </div>

      <div class="flex flex-col gap-1 mb-4">
        <label class="text-xs font-medium text-amber-600 uppercase tracking-wider">Email</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="dto.correoUsuario"
          placeholder="tu@email.com"
          class="bg-amber-900/30 border border-amber-800/50 rounded-xl px-4 py-3 text-sm text-amber-200 placeholder:text-amber-800 focus:outline-none focus:border-amber-600/60 transition-colors"
        />
      </div>

      <div class="flex flex-col gap-1 mb-6">
        <label class="text-xs font-medium text-amber-600 uppercase tracking-wider"
          >Contraseña</label
        >
        <input
          type="password"
          name="password"
          [(ngModel)]="dto.contrasenaUsuario"
          minlength="15"
          required
          #password="ngModel"
          placeholder="••••••••"
          class="bg-amber-900/30 border border-amber-800/50 rounded-xl px-4 py-3 text-sm text-amber-200 placeholder:text-amber-800 focus:outline-none focus:border-amber-600/60 transition-colors"
        />
        @if (password.invalid && password.touched) {
          <span class="text-red-400 text-xs mt-1"
            >La contraseña debe tener al menos 15 caracteres.</span
          >
        }
      </div>

      <button
        [disabled]="cargando"
        type="submit"
        class="w-full bg-linear-to-r from-amber-700 to-amber-900 hover:from-amber-600 hover:to-amber-800 active:scale-95 text-amber-200 font-semibold text-sm py-3 rounded-xl transition-all duration-200 border border-amber-700/50"
      >
        {{ cargando ? 'Registrando...' : 'Registrarse' }}
      </button>
    </form>

    <p class="text-center text-sm text-amber-800 mt-6">
      ¿Ya tienes cuenta?
      <a routerLink="/login" class="text-orange-400 hover:text-orange-300 transition-colors"
        >Inicia sesión</a
      >
    </p>
  </div>
</div>
