<div class="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-4 sm:p-6 gap-4">
  <div class="w-full max-w-sm bg-amber-900/20 border border-amber-900/50 rounded-md px-5 py-4">
    <div class="flex items-start gap-3">
      <svg
        class="size-4 text-amber-600 shrink-0 mt-0.5"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"
        />
      </svg>
      <div class="flex flex-col gap-2">
        <p class="text-amber-400 text-xs font-medium uppercase tracking-widest">
          Entorno de demostración
        </p>
        <div class="flex flex-col gap-1.5">
          <div class="flex items-center gap-2">
            <span class="size-1.5 rounded-full bg-amber-700 shrink-0"></span>
            <p class="text-amber-800 text-xs uppercase tracking-wider">
              Desplegado con herramientas gratuitas
            </p>
          </div>
          <div class="flex items-center gap-2">
            <span class="size-1.5 rounded-full bg-amber-700 shrink-0"></span>
            <p class="text-amber-800 text-xs uppercase tracking-wider">
              El servidor entra en reposo tras inactividad
            </p>
          </div>
          <div class="flex items-center gap-2">
            <span class="size-1.5 rounded-full bg-amber-700 shrink-0"></span>
            <p class="text-amber-800 text-xs uppercase tracking-wider">
              La primera petición puede tardar unos segundos
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div
    class="w-full max-w-sm bg-zinc-900/50 border border-amber-600/40 rounded-2xl p-8 sm:p-10 backdrop-blur-sm"
  >
    <div
      class="size-12 bg-amber-800/40 border border-amber-700/40 rounded-md flex items-center justify-center mx-auto mb-5"
    >
      <svg
        class="size-6 text-amber-400"
        fill="none"
        stroke="currentColor"
        stroke-width="1.8"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"
        />
      </svg>
    </div>

    <h1 class="text-center text-xl font-semibold text-amber-200 mb-1">Inicia sesión</h1>
    <p class="text-center text-sm text-amber-700 mb-8">Bienvenido de nuevo</p>

    <form (ngSubmit)="onSubmit()">
      <div class="flex flex-col gap-1 mb-4">
        <label class="text-xs font-medium text-amber-600 uppercase tracking-wider">Email</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="correo"
          placeholder="tu@email.com"
          class="bg-amber-900/30 border border-amber-600/50 rounded-md px-4 py-3 text-sm text-amber-200 placeholder:text-amber-800 focus:outline-none focus:border-amber-600/60 transition-colors"
        />
      </div>

      <div class="flex flex-col gap-1 mb-6">
        <label class="text-xs font-medium text-amber-600 uppercase tracking-wider"
          >Contraseña</label
        >
        <input
          type="password"
          name="password"
          [(ngModel)]="contrasena"
          placeholder="••••••••"
          class="bg-amber-900/30 border border-amber-600/50 rounded-md px-4 py-3 text-sm text-amber-200 placeholder:text-amber-800 focus:outline-none focus:border-amber-600/60 transition-colors"
        />
      </div>

      <button
        [disabled]="cargando"
        type="submit"
        class="w-full bg-linear-to-r from-amber-700 to-amber-900 hover:from-amber-600 hover:to-amber-800 active:scale-95 text-amber-200 font-semibold text-sm py-3 rounded-md transition-all duration-200 border border-amber-700/50 disabled:opacity-50 disabled:cursor-not-allowed disabled:pointer-events-none"
      >
        {{ cargando ? 'Iniciando sesión...' : 'Iniciar sesión' }}
      </button>
    </form>

    <p class="text-center text-sm text-amber-800 mt-6">
      ¿No tienes cuenta?
      <a routerLink="/register" class="text-orange-400 hover:text-orange-300 transition-colors"
        >Registrarse</a
      >
    </p>
  </div>
</div>
