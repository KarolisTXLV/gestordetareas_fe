<div class="min-h-screen bg-amber-950 flex items-center justify-center p-6">
  <div
    class="w-full max-w-md bg-amber-900/25 border border-amber-400/15 rounded-2xl p-9 backdrop-blur-sm"
  >
    <h1 class="text-xl font-semibold text-amber-200 mb-1">Mis espacios</h1>
    <p class="text-sm text-amber-400/45 mb-6">Selecciona un espacio o crea uno nuevo</p>

    <!-- Botón crear -->
    <button
      class="w-full flex items-center justify-center gap-2 bg-amber-700 hover:bg-amber-600 active:scale-95 text-white font-semibold text-sm py-3 rounded-xl transition-all duration-200 mb-6"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
      </svg>
      Crear espacio de trabajo
    </button>

    <!-- Divider -->
    <div class="flex items-center gap-3 mb-5">
      <span class="flex-1 h-px bg-amber-400/10"></span>
      <span class="text-xs text-amber-400/30">Espacios disponibles</span>
      <span class="flex-1 h-px bg-amber-400/10"></span>
    </div>

    <!-- Lista -->
    <div class="flex flex-col gap-3">
      @for (espacio of espaciosDeTrabajo(); track espacio.idEspacioDeTrabajo) {
        <button
          class="flex items-center gap-4 w-full text-left bg-amber-900/30 border border-amber-400/10 hover:border-amber-400/30 hover:bg-amber-900/50 rounded-xl px-4 py-3.5 transition-all duration-200 group"
        >
        
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-amber-200">{{ espacio.nombreEspacioTrabajo }}</p>
          </div>
          <svg
            class="w-4 h-4 text-amber-400/25 group-hover:text-amber-400/50 transition-all flex-shrink-0"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
          </svg>
        </button>
      }
    </div>
  </div>
</div>
