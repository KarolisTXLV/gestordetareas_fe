<div
  class="bg-linear-to-r from-zinc-800 to-gray-950 w-full p-5 h-52 shadow-md relative rounded-md md:overflow-hidden mb-4 bord border-l-3 border-l-amber-600"
>
  <div class="absolute top-4 left-4 right-4 flex justify-between items-center gap-2">
    <div>
      @if (!tarea().tienePrioridad) {
        <button
          (click)="modalPriorizarAbierto.set(true)"
          class="bg-red-500/20 text-red-300 border border-red-500/30 rounded-md px-2 sm:px-3 py-1 text-xs font-medium hover:bg-red-600/20"
        >
          <span class="hidden lg:inline">⚑</span> Priorizar
        </button>
      }
      @if (tarea().tienePrioridad) {
        <div
          class="flex items-center gap-1 bg-red-500/20 border border-red-500/30 rounded-md px-2 sm:px-3 py-1"
        >
          <span class="hidden lg:inline text-red-300 text-xs">⚑</span>
          <span class="text-red-300 text-xs font-medium">{{
            tarea().fechaLimite | date: 'dd/MM/yyyy'
          }}</span>
        </div>
      }
    </div>
    <button
      (click)="modalEditarAbierto.set(true)"
      class="bg-orange-400/20 text-orange-300 border border-orange-400/30 rounded-md px-2 sm:px-3 py-1 text-xs font-medium hover:bg-orange-500/20"
    >
      Editar
    </button>
  </div>
  <div class="mt-10">
    <p class="text-base font-semibold text-amber-500">{{ tarea().nombreTarea }}</p>
    <p class="text-xs mt-1.5 font-mono text-amber-600 leading-relaxed line-clamp-2">
      {{ tarea().descripcionTarea }}
    </p>
  </div>

  <select
    [ngModel]="tarea().estadosTarea"
    (ngModelChange)="cambiarEstado(+$event)"
    class="appearance-none bg-slate-900/60 text-amber-300 border border-amber-700/40 hover:border-amber-500/60 rounded-md pl-3 pr-8 py-1.5 text-xs font-medium cursor-pointer outline-none transition-all duration-200 absolute bottom-4 right-4"
  >
    <option class="bg-slate-900 text-amber-200" [value]="0">⩒ Por empezar</option>
    <option class="bg-slate-900 text-amber-200" [value]="1">⩒ En progreso</option>
    <option class="bg-slate-900 text-amber-200" [value]="3">⩒ Completada</option>
  </select>
</div>
@if (modalPriorizarAbierto()) {
  <div
    class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50"
    (click)="modalPriorizarAbierto.set(false)"
  >
    <div
      class="bg-zinc-900/90 border border-amber-900/50 rounded-md w-full max-w-sm mx-4 p-6 shadow-xl relative z-10"
      (click)="$event.stopPropagation()"
    >
      <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-2">
          <span class="size-2 rounded-full bg-amber-400 animate-pulse"></span>
          <h2 class="text-amber-300 text-xs font-medium tracking-widest uppercase">
            Priorizar tarea
          </h2>
        </div>
        <button
          (click)="modalPriorizarAbierto.set(false)"
          class="text-amber-700 hover:text-amber-400 transition-colors text-sm"
        >
          ✕
        </button>
      </div>

      <div class="flex flex-col gap-1.5 mb-4">
        <label class="text-xs font-medium text-amber-600 uppercase tracking-wider">
          Fecha límite <span class="text-amber-400">*</span>
        </label>
        <input
          type="date"
          [ngModel]="fechaLimite()"
          (ngModelChange)="fechaLimite.set($event)"
          class="bg-amber-900/30 border border-amber-600/50 rounded-md px-4 py-3 text-sm text-amber-200 focus:outline-none focus:border-amber-600/60 transition-colors"
        />
      </div>

      @if (error()) {
        <p class="text-red-400 text-xs mb-3">{{ error() }}</p>
      }

      <div class="flex justify-end items-center gap-2">
        <button
          (click)="modalPriorizarAbierto.set(false)"
          class="px-4 py-2 text-xs text-amber-700 hover:text-amber-400 uppercase tracking-wider transition-colors"
        >
          Cancelar
        </button>
        <button
          (click)="priorizarTarea()"
          [disabled]="cargando"
          class="px-4 py-2 text-xs bg-amber-500/15 hover:bg-amber-500/25 text-amber-400 uppercase tracking-wider font-medium rounded-md transition-colors disabled:opacity-50 disabled:cursor-not-allowed disabled:pointer-events-none"
        >
          {{ cargando ? 'Confirmando...' : '⚑ Confirmar prioridad' }}
        </button>
      </div>
    </div>
  </div>
}
@if (modalEditarAbierto()) {
  <app-editar-tarea-modal
    [tarea]="tarea()"
    (cerrar)="modalEditarAbierto.set(false)"
    (tareaEditada)="tareaEditada.emit()"
    (tareaEliminada)="tareaEliminada.emit()"
  />
}
