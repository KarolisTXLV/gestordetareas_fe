<div class="bg-amber-950 h-screen flex flex-col overflow-hidden">
  <header
    class="flex items-center h-14 px-4 sm:px-6 bg-transparent border-b border-amber-800/30 shrink-0"
  >
    <div class="flex-1">
      @if (rutaActual() !== '/workspaces') {
        <button
          (click)="vueltaAtras()"
          class="flex items-center text-amber-500 hover:text-amber-300 text-sm transition-colors"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
          </svg>
          Volver
        </button>
      }
    </div>

    <span class="text-sm font-medium tracking-tight text-amber-200">
      Just<span class="text-amber-600 font-normal">One</span>Step
    </span>

    <div class="flex-1 flex items-center justify-end gap-1">
      <div class="relative">
        <button
          (click)="notificacionesAbiertas.set(!notificacionesAbiertas())"
          class="relative size-9 flex items-center justify-center rounded-lg border border-amber-800/40 text-amber-500 hover:bg-amber-900/50 hover:text-amber-300 transition-colors"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="m11.25 11.25.041-.02a.75.75 0 0 1 1.063.852l-.708 2.836a.75.75 0 0 0 1.063.853l.041-.021M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9-3.75h.008v.008H12V8.25Z"
            />
          </svg>
          <span class="absolute top-1.5 right-1.5 size-1.5 rounded-full bg-orange-500"></span>
        </button>

        @if (notificacionesAbiertas()) {
          <div
            class="absolute right-0 top-11 w-72 bg-zinc-900 border border-zinc-700 rounded-xl shadow-xl z-50 p-4 flex flex-col gap-2"
          >
            <p class="text-zinc-400 text-xs font-medium uppercase tracking-wider mb-1">
              Notificaciones
            </p>
            <div class="text-zinc-500 text-sm text-center py-4">Sin notificaciones por ahora</div>
          </div>
        }
      </div>

      <div class="relative">
        <button
          (click)="ajustesAbiertos.set(!ajustesAbiertos())"
          class="size-9 flex items-center justify-center rounded-lg border border-amber-800/40 text-amber-500 hover:bg-amber-900/50 hover:text-amber-300 transition-colors"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"
            />
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
            />
          </svg>
        </button>

        @if (ajustesAbiertos()) {
          <div
            class="absolute right-0 top-11 w-56 bg-zinc-900 border border-zinc-700 rounded-xl shadow-xl z-50 py-2 flex flex-col"
          >
            <button
              class="flex items-center gap-2 px-4 py-2 text-sm text-zinc-300 hover:bg-zinc-800 transition-colors"
            >
              <i class="ti ti-user text-base"></i> Mi perfil
            </button>
            <button
              class="flex items-center gap-2 px-4 py-2 text-sm text-zinc-300 hover:bg-zinc-800 transition-colors"
            >
              <i class="ti ti-users text-base"></i> Mis amigos
            </button>
            <button
              (click)="buscarAmigoAbierto.set(true)"
              class="flex items-center gap-2 px-4 py-2 text-sm text-zinc-300 hover:bg-zinc-800 transition-colors"
            >
              <i class="ti ti-user-search text-base"></i> Buscar amigos
            </button>
            <div class="border-t border-zinc-700 my-1"></div>
            <button
              (click)="CerrarSesion()"
              class="flex items-center gap-2 px-4 py-2 text-sm text-red-400 hover:bg-zinc-800 transition-colors"
            >
              <i class="ti ti-logout text-base"></i> Cerrar sesión
            </button>
          </div>
        }
      </div>
      @if (buscarAmigoAbierto()) {
        <app-buscar-amigo-modal
          (cerrar)="buscarAmigoAbierto.set(false)"
          (amigoEncontrado)="onAmigoEncontrado($event)"
        />
      }
    </div>
  </header>

  <div class="flex-1 overflow-hidden">
    <router-outlet />
  </div>
</div>
